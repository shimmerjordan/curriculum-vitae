name: Build & publish web-page

on:
  push:
    branches: [main]
  workflow_dispatch:

# allow the workflow to push the built output to the web-page branch
permissions:
  contents: write

concurrency:
  group: build-web-page
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish dist/ to web-page branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: web-page
          force_orphan: true
          commit_message: "build: ${{ github.sha }}"
